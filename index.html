<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembukuan Dek Eva Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #FF85A1; --bg: #ffffff; --text: #000000; }
        .dark { --main-pink: #FF6B8B; --bg: #121212; --text: #ffffff; }
        
        body { font-family: 'Comic Neue', cursive; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); }
        
        header { padding: 15px; background: var(--main-pink); color: white; text-align: center; font-weight: bold; font-size: 1.4rem; flex-shrink: 0; display: flex; justify-content: center; align-items: center; gap: 10px; border-radius: 0 0 20px 20px; }
        .total-box { background: #FFE5EC; padding: 10px; text-align: center; font-weight: bold; color: var(--main-pink); border-bottom: 2px solid var(--main-pink); font-size: 1.2rem; }
        
        .container { flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; }
        #listDompet { flex-grow: 1; }
        
        .card { border: 3px solid var(--main-pink); padding: 15px; margin-bottom: 10px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 133, 161, 0.05); }
        table { width: 100%; border-collapse: collapse; border: 3px solid var(--main-pink); table-layout: auto; border-radius: 15px; overflow: hidden; margin-bottom: 10px;}
        
        th, td { 
            border: 2px solid var(--main-pink); 
            border-bottom: 3px solid var(--main-pink); 
            padding: 10px; 
            text-align: center; 
            font-size: 1.1rem; 
            white-space: nowrap; 
            color: var(--text); 
        }
        
        .col-tgl { width: 80px; min-width: 80px; }
        th { background: #FFE5EC; font-weight: bold; color: #000; }
        
        input[type="date"] { border: none; width: 100%; font-size: 0.9rem; background: transparent; color: var(--text); font-family: inherit; }
        button { padding: 8px 15px; background: var(--main-pink); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-family: inherit; }
    </style>
</head>
<body>

<header>
    <span>🌸 PEMBUKUAN DEK EVA</span>
    <button onclick="toggleTheme()">🌓</button>
</header>
<div id="totalGlobal" class="total-box">Total Aset: Rp 0</div>

<div id="homePage" class="container">
    <div class="card">
        <input type="text" id="wName" placeholder="Nama Dompet">
        <button onclick="tambahDompet()">+ Tambah</button>
    </div>
    <div id="listDompet"></div>
</div>

<div id="detailPage" class="container" style="display:none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <button onclick="showHome()">← Kembali</button>
        <button onclick="tambahBaris()">+ Tambah Baris</button>
    </div>
    <h2 id="judul" style="text-align: center;"></h2>
    <table>
        <thead>
            <tr>
                <th class="col-tgl">Tgl</th>
                <th>Keterangan</th>
                <th>Masuk</th>
                <th>Keluar</th>
                <th>Saldo</th>
            </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
    </table>
</div>

<script>
    let db;
    let currentWallet = "";
    let req = indexedDB.open("EvaDB", 13);
    req.onupgradeneeded = e => {
        let db = e.target.result;
        if(!db.objectStoreNames.contains("dompet")) db.createObjectStore("dompet", {keyPath: "id", autoIncrement: true});
        if(!db.objectStoreNames.contains("dataTabel")) db.createObjectStore("dataTabel", {keyPath: "id"});
    };
    req.onsuccess = e => { db = e.target.result; loadDompet(); };

    function toggleTheme() { document.body.classList.toggle("dark"); }

    function tambahDompet() {
        let n = document.getElementById("wName").value;
        if(!n) return;
        db.transaction("dompet", "readwrite").objectStore("dompet").add({name: n}).onsuccess = () => {
            document.getElementById("wName").value = ""; loadDompet();
        };
    }

    function loadDompet() {
        let list = document.getElementById("listDompet");
        list.innerHTML = "";
        let totalGlobal = 0;
        db.transaction("dompet").objectStore("dompet").getAll().onsuccess = e => {
            let dompetList = e.target.result;
            db.transaction("dataTabel").objectStore("dataTabel").getAll().onsuccess = e2 => {
                let dataTabel = e2.target.result;
                dompetList.forEach(w => {
                    let data = dataTabel.find(d => d.id === w.name);
                    let saldo = 0;
                    if(data) data.rows.forEach(r => saldo += (parseFloat(r.deb.replace(/\./g, "")) || 0) - (parseFloat(r.kre.replace(/\./g, "")) || 0));
                    totalGlobal += saldo;
                    list.innerHTML += `<div class="card">
                        <div><div contenteditable="true" onblur="editDompet(${w.id}, this.innerText)" style="font-weight:bold">${w.name}</div><small>Saldo: Rp ${saldo.toLocaleString("id-ID")}</small></div>
                        <div><button onclick="buka('${w.name}')">Buka</button><button style="background:#FF4D4D" onclick="konfirmasiHapus(${w.id})">X</button></div>
                    </div>`;
                });
                document.getElementById("totalGlobal").innerText = "Total Aset: Rp " + totalGlobal.toLocaleString("id-ID");
            };
        };
    }

    function konfirmasiHapus(id) { if (confirm("Yakin hapus?")) db.transaction("dompet", "readwrite").objectStore("dompet").delete(id).onsuccess = loadDompet; }
    function editDompet(id, name) { db.transaction("dompet", "readwrite").objectStore("dompet").put({id: id, name: name}).onsuccess = loadDompet; }

    function buka(name) {
        currentWallet = name;
        document.getElementById("homePage").style.display = "none";
        document.getElementById("detailPage").style.display = "block";
        document.getElementById("judul").innerText = name;
        renderTabel();
    }

    function renderTabel() {
        let body = document.getElementById("tabelBody");
        body.innerHTML = "";
        db.transaction("dataTabel").objectStore("dataTabel").get(currentWallet).onsuccess = e => {
            let savedRows = e.target.result ? e.target.result.rows : [];
            savedRows.forEach((r, i) => {
                body.innerHTML += `<tr>
                    <td class="col-tgl"><input type="date"></td>
                    <td contenteditable="true" onblur="simpan('${currentWallet}')">${r.ket}</td>
                    <td contenteditable="true" onblur="simpan('${currentWallet}'); formatUang(this)" onfocus="bersihkan(this)">${r.deb}</td>
                    <td contenteditable="true" onblur="simpan('${currentWallet}'); formatUang(this)" onfocus="bersihkan(this)">${r.kre}</td>
                    <td class="s">0</td>
                </tr>`;
            });
            hitung();
        };
    }

    function tambahBaris() {
        let body = document.getElementById("tabelBody");
        for(let i=0; i<10; i++) {
            body.innerHTML += `<tr>
                <td class="col-tgl"><input type="date"></td>
                <td contenteditable="true" onblur="simpan('${currentWallet}')"></td>
                <td contenteditable="true" onblur="simpan('${currentWallet}'); formatUang(this)" onfocus="bersihkan(this)"></td>
                <td contenteditable="true" onblur="simpan('${currentWallet}'); formatUang(this)" onfocus="bersihkan(this)"></td>
                <td class="s">0</td>
            </tr>`;
        }
    }

    function bersihkan(el) { el.innerText = el.innerText.replace(/\./g, ""); }
    function formatUang(el) { let val = el.innerText.replace(/\D/g, ""); el.innerText = val ? parseInt(val).toLocaleString("id-ID") : ""; hitung(); }
    function simpan(name) {
        let rows = [];
        document.querySelectorAll("#tabelBody tr").forEach(tr => {
            rows.push({ ket: tr.cells[1].innerText, deb: tr.cells[2].innerText, kre: tr.cells[3].innerText });
        });
        db.transaction("dataTabel", "readwrite").objectStore("dataTabel").put({id: name, rows: rows});
    }
    function hitung() {
        let s = 0;
        document.querySelectorAll("#tabelBody tr").forEach(r => {
            let d = parseFloat(r.cells[2].innerText.replace(/\./g, "")) || 0;
            let k = parseFloat(r.cells[3].innerText.replace(/\./g, "")) || 0;
            s += (d - k);
            r.cells[4].innerText = (d==0 && k==0) ? 0 : s.toLocaleString("id-ID");
        });
    }
    function showHome() { document.getElementById("homePage").style.display = "block"; document.getElementById("detailPage").style.display = "none"; loadDompet(); }
</script>
</body>
</html>
