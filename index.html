<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembukuan Dek Eva</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <!-- Memanggil file CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <span>🌸 PEMBUKUAN DEK EVA</span>
    <button onclick="toggleTheme()">🌓</button>
</header>
<div id="totalGlobal" class="total-box">Total Aset: Rp 0</div>

<div id="homePage" class="container">
    <div class="card">
        <input type="text" id="wName" placeholder="Nama Dompet">
        <button onclick="tambahDompet()">+ Tambah</button>
    </div>
    <div id="listDompet"></div>
</div>

<div id="detailPage" class="container" style="display:none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <button onclick="showHome()">← Kembali</button>
        <button onclick="tambahBaris()">+ Tambah Baris</button>
    </div>
    <h2 id="judul" style="text-align: center;"></h2>
    <table>
        <thead>
            <tr>
                <th class="col-tgl">Tgl</th>
                <th>Keterangan</th>
                <th>Masuk</th>
                <th>Keluar</th>
                <th>Saldo</th>
                <th>Aksi</th> <!-- TAMBAHAN KOLOM AKSI -->
            </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
    </table>
</div>

<!-- Memanggil file JavaScript -->
<script src="script.js"></script>
</body>
</html>
